<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB BOY</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
}

header {
  background: linear-gradient(to right, black, gold);
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 50px;
  margin: 0;
}

.catch {
  font-size: 18px;
  margin-top: 10px;
}

.button {
  display: inline-block;
  background: gold;
  color: black;
  padding: 15px 30px;
  margin-top: 20px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.cast-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.cast {
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

.cast img {
  width: 100%;
  border-radius: 10px;
}

.price {
  font-size: 20px;
  margin: 10px 0;
}
</style>
</head>

<body>

<header>
  <h1>CLUB BOY</h1>
  <p class="catch">歌舞伎町No.1ホストクラブ</p>
  <p class="price">初回 ¥3,000 / 飲み放題</p>
  <a href="https://lin.ee/〇〇〇" class="button">今すぐLINE予約</a>
</header>

<div class="section">
  <h2>CAST</h2>
  <div class="cast-grid">

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>代表 REN</p>
    </div>

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>No.1 翔</p>
    </div>

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>幹部 裕也</p>
    </div>

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>新人 蓮</p>
    </div>

  </div>
</div>

<div class="section">
  <h2>SYSTEM</h2>
  <p>初回：¥3,000（60分 飲み放題）</p>
  <p>通常：¥5,000〜</p>
</div>

<div class="section">
  <h2>EVENT</h2>
  <p>毎週金曜 シャンパンイベント開催</p>
</div>

<div class="section">
  <h2>ACCESS</h2>
  <p>歌舞伎町○○ビル3F</p>
</div>

<div class="section">
  <a href="https://lin.ee/〇〇〇" class="button">LINEで予約する</a>
</div>

</body>
</html>
