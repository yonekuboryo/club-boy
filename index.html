<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB BOY</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 背景アニメーション /
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,215,0,0.2), transparent);
  animation: bgMove 8s linear infinite;
  z-index: -1;
}
@keyframes bgMove {
  0% { transform: translate(-20%, -20%); }
  50% { transform: translate(0%, 0%); }
  100% { transform: translate(-20%, -20%); }
}

/ 初期画面 /
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#intro h1 span {
  opacity: 0;
  display: inline-block;
  transform: translateY(20px);
}

/ フェードアウト /
.fade-out {
  animation: fadeOut 1s forwards;
}
@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/ メイン /
#main {
  opacity: 0;
  transition: 1s;
}
#main.show {
  opacity: 1;
}

/ ヘッダー /
header {
  text-align: center;
  padding: 40px 20px;
}

/ ボタン /
.button {
  background: gold;
  color: black;
  padding: 15px 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
}

/ キャスト /
.cast {
  margin: 20px;
}
.cast img {
  width: 100%;
}

/ LINEボタン */
.fixed-line {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #06C755;
  padding: 20px;
  border-radius: 50%;
  animation: float 2s infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<!-- 最初の画面 -->
<div id="intro">
  <h1 id="text"></h1>
</div>

<!-- メイン -->
<div id="main">
  <header>
    <h1>CLUB BOY</h1>
    <p>歌舞伎町No.1ホストクラブ</p>
    <a href="https://lin.ee/〇〇〇" class="button">LINE予約</a>
  </header>

  <h2 style="text-align:center;">CAST</h2>

  <div class="cast">
    <img src="https://picsum.photos/400">
    <p>代表 REN</p>
  </div>

  <div class="cast">
    <img src="https://picsum.photos/401">
    <p>No.1 翔</p>
  </div>
</div>

<a href="https://lin.ee/〇〇〇" class="fixed-line">LINE</a>

<script>
// 文字アニメーション
const text = "すべての夜に、価値を。";
const el = document.getElementById("text");

text.split("").forEach((char, i) => {
  const span = document.createElement("span");
  span.textContent = char;
  el.appendChild(span);

  setTimeout(() => {
    span.style.opacity = 1;
    span.style.transform = "translateY(0)";
  }, i * 100);
});

// 画面切り替え
setTimeout(() => {
  document.getElementById("intro").classList.add("fade-out");
  document.getElementById("main").classList.add("show");
}, 3000);
</script>

</body>
</html>
