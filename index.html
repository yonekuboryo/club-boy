<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB BOY</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 背景の動き /
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 70%);
  animation: bgMove 10s linear infinite;
}
@keyframes bgMove {
  0% { transform: translate(-25%, -25%); }
  50% { transform: translate(0%, 0%); }
  100% { transform: translate(-25%, -25%); }
}

/ 最初 /
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hero span {
  opacity: 0;
  display: inline-block;
  transform: translateY(20px);
}

/ スクロール表示 /
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}
.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/ ヘッダー /
header {
  text-align: center;
  padding: 40px 20px;
}

.button {
  display: inline-block;
  background: gold;
  color: black;
  padding: 15px 30px;
  margin-top: 20px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

/ キャスト /
.cast-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  padding: 20px;
}

.cast {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}
.cast:hover {
  transform: scale(1.08);
}

.cast img {
  width: 100%;
}

/ LINEボタン */
.fixed-line {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #06C755;
  padding: 18px;
  border-radius: 50%;
  animation: float 2s infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<div class="hero">
  <h1 id="text"></h1>
</div>

<header class="fade">
  <h1>CLUB BOY</h1>
  <p>歌舞伎町No.1ホストクラブ</p>
  <a href="https://lin.ee/〇〇〇" class="button">LINE予約</a>
</header>

<div class="fade">
  <h2 style="text-align:center;">CAST</h2>
  <div class="cast-grid">
    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>社長 蒼井ゆうと</p>
    </div>
    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>PICK UP 咲夜蓮</p>
    </div>
  </div>
</div>

<a href="https://lin.ee/〇〇〇" class="fixed-line">LINE</a>

<script>
// 文字が1文字ずつ出る
const text = "すべての夜に、価値を。";
const el = document.getElementById("text");

text.split("").forEach((char, i) => {
  const span = document.createElement("span");
  span.textContent = char;
  el.appendChild(span);

  setTimeout(() => {
    span.style.opacity = 1;
    span.style.transform = "translateY(0)";
  }, i * 100);
});

// スクロールで表示
const fades = document.querySelectorAll(".fade");
window.addEventListener("scroll", () => {
  fades.forEach(f => {
    const rect = f.getBoundingClientRect().top;
    if (rect < window.innerHeight - 50) {
      f.classList.add("show");
    }
  });
});
</script>

</body>
</html>
