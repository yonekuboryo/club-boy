<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB BOY</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* 最初のコンセプト画面 /
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: black;
}

.hero h1 {
  font-size: 40px;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 1.5s forwards;
}

.hero p {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 1.5s 0.5s forwards;
}

/ アニメーション /
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/ メイン /
header {
  text-align: center;
  padding: 40px 20px;
  background: linear-gradient(to right, black, gold);
}

h1 {
  font-size: 50px;
  margin: 0;
}

.button {
  display: inline-block;
  background: gold;
  color: black;
  padding: 15px 30px;
  margin-top: 20px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

/ 固定LINEボタン /
.fixed-line {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #06C755;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  color: white;
}

/ セクション /
.section {
  padding: 40px 20px;
  text-align: center;
}

/ キャスト */
.cast-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.cast {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.cast:hover {
  transform: scale(1.05);
}

.cast img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- 最初のコンセプト -->
<div class="hero">
  <h1>すべての夜に、価値を。</h1>
  <p>歌舞伎町で一番、記憶に残る時間を。</p>
</div>

<header>
  <h1>CLUB BOY</h1>
  <p>初回 ¥3,000 / 飲み放題</p>
  <a href="https://lin.ee/〇〇〇" class="button">LINE予約</a>
</header>

<div class="section">
  <h2>CAST</h2>
  <div class="cast-grid">

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>代表 REN</p>
    </div>

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>No.1 翔</p>
    </div>

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>幹部 裕也</p>
    </div>

    <div class="cast">
      <img src="https://via.placeholder.com/300">
      <p>新人 蓮</p>
    </div>

  </div>
</div>

<div class="section">
  <h2>SYSTEM</h2>
  <p>初回：¥3,000（60分 飲み放題）</p>
  <p>通常：¥5,000〜</p>
</div>

<div class="section">
  <h2>INSTAGRAM</h2>
  <a href="https://instagram.com/〇〇" class="button">Instagramを見る</a>
</div>

<div class="section">
  <h2>ACCESS</h2>
  <p>歌舞伎町○○ビル3F</p>
</div>

<!-- 固定ボタン -->
<a href="https://lin.ee/〇〇〇" class="fixed-line">LINE</a>

</body>
</html>
