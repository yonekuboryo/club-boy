<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB BOY</title>

<style>
body {
 margin:0;
 background:black;
 color:white;
 font-family:sans-serif;
 text-align:center;
}

/* 最初の画面 /
#intro {
 position:fixed;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 background:black;
 z-index:999;
}

/ メイン /
#main {
 opacity:0;
 transition:1s;
}

.show {
 opacity:1;
}

/ フェード /
.fade {
 opacity:0;
 transition:1s;
}
</style>
</head>

<body>

<div id="intro">
 <h1 id="text"></h1>
</div>

<div id="main">
 <h1>CLUB BOY</h1>
 <p>歌舞伎町No.1ホストクラブ</p>
</div>

<script>
const text = "すべての夜に、価値を。";
const el = document.getElementById("text");

text.split("").forEach((c,i)=>{
 const span = document.createElement("span");
 span.textContent = c;
 span.style.opacity = 0;
 span.style.display = "inline-block";
 span.style.transform = "translateY(20px)";
 span.style.transition = "0.3s";
 el.appendChild(span);

 setTimeout(()=>{
  span.style.opacity = 1;
  span.style.transform = "translateY(0)";
 }, i100);
});

// 画面切り替え
setTimeout(()=>{
 document.getElementById("intro").classList.add("fade");
 document.getElementById("main").classList.add("show");
},3000);
</script>

</body>
</html>
