<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB BOY</title>

<style>
body{
 margin:0;
 background:black;
 color:white;
 font-family:sans-serif;
 overflow-x:hidden;
}

/* 背景アニメーション */
body::before{
 content:"";
 position:fixed;
 width:200%;
 height:200%;
 background: radial-gradient(circle, rgba(255,215,0,0.15), transparent);
 animation: bgMove 10s linear infinite;
 z-index:-1;
}
@keyframes bgMove{
 0%{transform:translate(-20%,-20%)}
 50%{transform:translate(0%,0%)}
 100%{transform:translate(-20%,-20%)}
}

/* 最初画面 */
#intro{
 position:fixed;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 background:black;
 z-index:999;
 transition:1s;
}
#intro span{
 opacity:0;
 display:inline-block;
 transform:translateY(20px);
 transition:0.3s;
}

/* メイン */
#main{
 opacity:0;
 transition:1s;
 text-align:center;
 padding-top:80px;
 position:relative;
 z-index:10;
}
.show{
 opacity:1;
}

/* ボタン */
.button{
 background:gold;
 color:black;
 padding:12px 20px;
 display:inline-block;
 margin:10px;
 border-radius:5px;
 text-decoration:none;
}

/* キャスト */
.cast-wrap{
 display:flex;
 overflow-x:auto;
 gap:15px;
 padding:20px;
}
.cast{
 min-width:200px;
 background:#111;
 border-radius:10px;
 overflow:hidden;
}
.cast img{
 width:100%;
}

/* LINEボタン */
.line-btn{
 position:fixed;
 bottom:20px;
 right:20px;
 width:70px;
 height:70px;
 background:#06C755;
 color:white;
 font-weight:bold;
 text-decoration:none;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:50%;
 z-index:99999;
 box-shadow:0 0 20px rgba(0,0,0,0.5);
 animation:pulse 1.5s infinite;

}
 
@keyframes glow{
 from{ text-shadow:0 0 10px gold; }
 to{ text-shadow:0 0 30px gold; }
}
@keyframes float{
 0%,100%{transform:translateY(0)}
 50%{transform:translateY(-10px)}
}

@keyframes pulse{
 0%{transform:scale(1)}
 50%{transform:scale(1.1)}
 100%{transform:scale(1)}
}
 .cast{
 transition:0.3s;
}
.cast:hover{
 transform:scale(1.05);
}
 .bg-video{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 object-fit:cover;
 z-index:-2;
}
</style>

</head>

<body>
 <video autoplay muted loop playsinline class="bg-video">

<script>
window.onload = function(){

 const text = "すべての夜に、価値を。";
 const el = document.getElementById("text");

 text.split("").forEach((c,i)=>{
  const span = document.createElement("span");
  span.textContent = c;
  el.appendChild(span);

  setTimeout(()=>{
   span.style.opacity = 1;
   span.style.transform = "translateY(0)";
  }, i * 80);
 });

 setTimeout(()=>{
  const intro = document.getElementById("intro");
  const main = document.getElementById("main");

  intro.style.opacity = 0;

  setTimeout(()=>{
   intro.style.display = "none";
   main.style.opacity = 1;
   main.style.zIndex = 10;
  },1000);

 },3000);

}
</script>

</html>
