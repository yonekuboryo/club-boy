<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLUB BOY</title>

<style>
body{
 margin:0;
 background:black;
 color:white;
 font-family:sans-serif;
 overflow-x:hidden;
}

/* 背景アニメーション */
body::before{
 content:"";
 position:fixed;
 width:200%;
 height:200%;
 background: radial-gradient(circle, rgba(255,215,0,0.15), transparent);
 animation: bgMove 10s linear infinite;
 z-index:-1;
}
@keyframes bgMove{
 0%{transform:translate(-20%,-20%)}
 50%{transform:translate(0%,0%)}
 100%{transform:translate(-20%,-20%)}
}

/* 最初画面 */
#intro{
 position:fixed;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 background:black;
 z-index:999;
 transition:1s;
}
#intro span{
 opacity:0;
 display:inline-block;
 transform:translateY(20px);
 transition:0.3s;
}

/* メイン */
#main{
 opacity:0;
 transition:1s;
 text-align:center;
 padding-top:80px;
}
.show{
 opacity:1;
}

/* ボタン */
.button{
 background:gold;
 color:black;
 padding:12px 20px;
 display:inline-block;
 margin:10px;
 border-radius:5px;
 text-decoration:none;
}

/* キャスト */
.cast-wrap{
 display:flex;
 overflow-x:auto;
 gap:15px;
 padding:20px;
}
.cast{
 min-width:200px;
 background:#111;
 border-radius:10px;
 overflow:hidden;
}
.cast img{
 width:100%;
}

/* LINEボタン */
.line-btn{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#06C755;
 padding:20px;
 border-radius:50%;
 animation:float 2s infinite;
}
@keyframes float{
 0%,100%{transform:translateY(0)}
 50%{transform:translateY(-10px)}
}
</style>
</head>

<body>

<div id="intro">
 <h1 id="text"></h1>
</div>

<div id="main">

 <h1>CLUB BOY</h1>
 <p>歌舞伎町No.1ホストクラブ</p>

 <a href="#" class="button">LINE予約</a>
 <a href="#" class="button">Instagram</a>

 <h2>CAST</h2>

 <div class="cast-wrap">

  <div class="cast">
   <img src="https://picsum.photos/300?1">
   <p>代表 REN</p>
  </div>

  <div class="cast">
   <img src="https://picsum.photos/300?2">
   <p>No.1 翔</p>
  </div>

  <div class="cast">
   <img src="https://picsum.photos/300?3">
   <p>幹部 裕也</p>
  </div>

 </div>

</div>

<a href="#" class="line-btn">LINE</a>

<script>
window.onload = function(){

 const text = "すべての夜に、価値を。";
 const el = document.getElementById("text");

 text.split("").forEach((c,i)=>{
  const span = document.createElement("span");
  span.textContent = c;
  el.appendChild(span);

  setTimeout(()=>{
   span.style.opacity = 1;
   span.style.transform = "translateY(0)";
  }, i * 80);
 });

 setTimeout(()=>{
  const intro = document.getElementById("intro");
  const main = document.getElementById("main");

  intro.style.opacity = 0;

  setTimeout(()=>{
   intro.style.display = "none";
   main.classList.add("show");
  },1000);

 },3000);

}
</script>

</body>
</html>
